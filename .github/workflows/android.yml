name: Android CI

on:
  push:
    branches: [ "master", "develop", "feature/LP-*" ]
  pull_request:
    branches: [ "master", "develop", "feature/LP-*" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 1.8
      uses: actions/setup-java@v3
      with:
        java-version: '1.8'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Run Unit Test
      run: ./gradlew test

    - name: Build with Gradle
      run: ./gradlew build
